  D().innerHTML=
   `<div class="dhead" style="border-top:4px solid var(--ink)"><button class="dclose">×</button>`+
     `<span class="dchip" style="background:#eef3f5;color:var(--ink)">${isNew?'New client':'Client'}</span><h3>${isNew?'Add a client':esc(c.name)}</h3></div>`+
   `<div class="dbody">`+
     `<label class="elab">Name</label><input class="ein" id="c-name" value="${esc(c.name)}">`+
     `<label class="elab">Email</label><input class="ein" id="c-email" value="${esc(c.email)}">`+
     `<label class="elab">Colour</label><div style="display:flex;align-items:center;gap:10px"><input type="color" id="c-color" value="${c.color||NOCLIENT}" style="width:52px;height:34px;padding:2px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff"><span class="note" style="margin:0">Pick this client's colour on the wheel</span></div>`+
     `<label class="elab" style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink);margin-top:14px"><input type="checkbox" id="c-self" ${c.self?'checked':''}> This is my own brand</label>`+
     `<label class="elab">Notes</label><textarea class="ein" id="c-notes" rows="3">${esc(c.notes)}</textarea>`+
     (isNew?'':`<div class="dlabelk" style="margin-top:18px">Contacts (${cts.length})</div>${contactList}<div class="dlabelk" style="margin-top:16px">Projects (${projs.length})</div>${projList}<div class="dlabelk" style="margin-top:16px">Tasks (${tasks.length})</div>${taskList}<button class="ddelete" id="c-delete">Delete client</button>`)+
   `</div>`+
   `<div class="dact"><button id="c-cancel">Cancel</button><button class="primary" id="c-save">${isNew?'Add':'Save'}</button></div>`;
  D().querySelector('.dclose').onclick=closeDetail;
  D().querySelector('#c-cancel').onclick=closeDetail;
  D().querySelector('#c-save').onclick=()=>saveClient(c,isNew);
  const del=document.getElementById('c-delete'); if(del) del.onclick=()=>deleteClient(c);
  D().querySelectorAll('.ev[data-key]').forEach(r=>r.onclick=()=>{ const t=allByLabel[r.getAttribute('data-key')]; if(t) openDetail(t); });
  D().classList.add('show'); document.getElementById('scrim').classList.add('show');
}
function saveClient(c,isNew){
  const oldName=c.name, newName=(document.getElementById('c-name').value||'Untitled client').trim();
  c.notes=document.getElementById('c-notes').value; c.self=document.getElementById('c-self').checked; c.email=document.getElementById('c-email').value;
  const col=document.getElementById('c-color'); if(col){ c.color=col.value; c.customColor=true; }
  c.name=newName;
  if(isNew){ while(CLIENTS.some(x=>x.name===c.name)) c.name+=' (2)'; c.color=c.color||CLIENT_PALETTE[CLIENTS.length%CLIENT_PALETTE.length]; CLIENTS.push(c); }
  else if(newName!==oldName){ ROUTINES.concat(ONEOFFS).forEach(t=>{ if(t.project===oldName) t.project=newName; }); PROJ_LIST.forEach(p=>{ if(p.client===oldName) p.client=newName; }); }
  recolorAll(); renderClientKey(); renderFilterClients(); rebuildIndex(); build(); saveTasks(); closeDetail(); renderSection('clients');
}
function deleteClient(c){
  const i=CLIENTS.indexOf(c); if(i>=0) CLIENTS.splice(i,1);
  ROUTINES.concat(ONEOFFS).forEach(t=>{ if(t.project===c.name) t.project=''; });
  PROJ_LIST.forEach(p=>{ if(p.client===c.name) p.client=''; });
  recolorAll(); renderClientKey(); renderFilterClients(); rebuildIndex(); build(); saveTasks(); closeDetail(); renderSection('clients');
}
/* ---- Contacts ---- */
function openContact(idx){
  const isNew=idx==null;
  const c=isNew?{name:'',email:'',phone:'',role:'',client:'',notes:''}:CONTACTS[idx];
  if(!c) return;
  D().innerHTML=
   `<div class="dhead" style="border-top:4px solid var(--ink)"><button class="dclose">×</button>`+
     `<span class="dchip" style="background:#eef3f5;color:var(--ink)">${isNew?'New contact':'Contact'}</span><h3>${isNew?'Add a contact':esc(c.name)}</h3></div>`+
   `<div class="dbody">`+
     `<label class="elab">Name</label><input class="ein" id="k-name" value="${esc(c.name)}">`+
     `<label class="elab">Role / title</label><input class="ein" id="k-role" value="${esc(c.role)}">`+
     `<label class="elab">Client / company</label><select class="ein" id="k-client">${['(none)'].concat(CLIENTS.map(x=>x.name)).map(s=>opt(s,c.client||'(none)')).join('')}</select>`+
     `<label class="elab">Email</label><input class="ein" id="k-email" value="${esc(c.email)}">`+
     `<label class="elab">Phone</label><input class="ein" id="k-phone" value="${esc(c.phone)}">`+
     `<label class="elab">Notes</label><textarea class="ein" id="k-notes" rows="3">${esc(c.notes)}</textarea>`+
     (isNew?'':`<button class="ddelete" id="k-delete">Delete contact</button>`)+
   `</div>`+
   `<div class="dact"><button id="k-cancel">Cancel</button><button class="primary" id="k-save">${isNew?'Add':'Save'}</button></div>`;
  D().querySelector('.dclose').onclick=closeDetail;
  D().querySelector('#k-cancel').onclick=closeDetail;
  D().querySelector('#k-save').onclick=()=>saveContact(c,isNew);
  const del=document.getElementById('k-delete'); if(del) del.onclick=()=>deleteContact(c);
  D().classList.add('show'); document.getElementById('scrim').classList.add('show');
}
function saveContact(c,isNew){
  const v=id=>document.getElementById(id).value;
  c.name=(v('k-name')||'Unnamed').trim(); c.role=v('k-role'); c.email=v('k-email'); c.phone=v('k-phone'); c.notes=v('k-notes');
  c.client=(v('k-client')==='(none)')?'':v('k-client');
  if(isNew) CONTACTS.push(c);
  saveTasks(); closeDetail(); renderSection('contacts');
}
function deleteContact(c){ const i=CONTACTS.indexOf(c); if(i>=0) CONTACTS.splice(i,1); saveTasks(); closeDetail(); renderSection('contacts'); }

/* ---- Timesheets ---- */
function openTimeEntry(idx){
  const isNew=idx==null;
  const e=isNew?{date:dateVal(vnow()),client:'',proj:'',task:'',minutes:0,billable:true,notes:''}:TIMESHEETS[idx];
  if(!e) return;
  const hrs=e.minutes?(Math.round(e.minutes/60*100)/100):'';
  D().innerHTML=
   `<div class="dhead" style="border-top:4px solid var(--ink)"><button class="dclose">×</button>`+
     `<span class="dchip" style="background:#eef3f5;color:var(--ink)">${isNew?'Log time':'Time entry'}</span><h3>${isNew?'Log time':esc(e.task||'Time entry')}</h3></div>`+
   `<div class="dbody">`+
     `<label class="elab">Date</label><input class="ein" id="t-date" type="date" value="${e.date||dateVal(vnow())}">`+
     `<label class="elab">Client</label><select class="ein" id="t-client">${['(none)'].concat(CLIENTS.map(x=>x.name)).map(s=>opt(s,e.client||'(none)')).join('')}</select>`+
     `<label class="elab">Project</label><select class="ein" id="t-proj">${['(none)'].concat(PROJ_LIST.map(p=>p.name)).map(s=>opt(s,e.proj||'(none)')).join('')}</select>`+
     `<label class="elab">Task / description</label><input class="ein" id="t-task" list="t-tasklist" value="${esc(e.task)}"><datalist id="t-tasklist">${ROUTINES.concat(ONEOFFS).map(t=>`<option value="${esc(t.label)}"></option>`).join('')}</datalist>`+
     `<label class="elab">Time (hours)</label><input class="ein" id="t-hrs" type="number" min="0" step="0.25" value="${hrs}" placeholder="e.g. 1.5">`+
     `<label class="elab" style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink);margin-top:14px"><input type="checkbox" id="t-bill" ${e.billable?'checked':''}> Billable</label>`+
     `<label class="elab">Notes</label><textarea class="ein" id="t-notes" rows="3">${esc(e.notes)}</textarea>`+
     (isNew?'':`<button class="ddelete" id="t-delete">Delete entry</button>`)+
   `</div>`+
   `<div class="dact"><button id="t-cancel">Cancel</button><button class="primary" id="t-save">${isNew?'Log it':'Save'}</button></div>`;
  D().querySelector('.dclose').onclick=closeDetail;
  D().querySelector('#t-cancel').onclick=closeDetail;
  D().querySelector('#t-save').onclick=()=>saveTimeEntry(e,isNew);
  const del=document.getElementById('t-delete'); if(del) del.onclick=()=>deleteTimeEntry(e);
  D().classList.add('show'); document.getElementById('scrim').classList.add('show');
}
function saveTimeEntry(e,isNew){
  const v=id=>document.getElementById(id).value;
  e.date=v('t-date'); e.client=(v('t-client')==='(none)')?'':v('t-client'); e.proj=(v('t-proj')==='(none)')?'':v('t-proj');
  e.task=v('t-task').trim(); e.minutes=Math.round((parseFloat(v('t-hrs'))||0)*60); e.billable=document.getElementById('t-bill').checked; e.notes=v('t-notes');
  if(isNew) TIMESHEETS.push(e);
  saveTasks(); closeDetail(); renderSection('timesheets');
}
function deleteTimeEntry(e){ const i=TIMESHEETS.indexOf(e); if(i>=0) TIMESHEETS.splice(i,1); saveTasks(); closeDetail(); renderSection('timesheets'); }

/* ---- live start/stop timer (real wall-clock; survives reload via config) ---- */
function getTimer(){ return getCfg().timer||null; }
function setTimer(t){ const c=getCfg(); c.timer=t; setCfg(c); }
function clearTimer(){ const c=getCfg(); delete c.timer; setCfg(c); }
let _tick=null;
function tickTimer(){
  clearInterval(_tick);
  const upd=()=>{ const el=document.getElementById('tmr-clock'), t=getTimer(); if(!el||!t){ clearInterval(_tick); return; }
    const s=Math.max(0,Math.floor((Date.now()-t.startedAt)/1000));
    const p=n=>String(n).padStart(2,'0');
    el.textContent=p(Math.floor(s/3600))+':'+p(Math.floor(s%3600/60))+':'+p(s%60); };
  upd(); _tick=setInterval(upd,1000);
}
function timerBarHTML(){
  const t=getTimer();
  if(t) return `<div class="tmrbar running"><span class="tmrclock" id="tmr-clock">00:00:00</span>`+
    `<span class="tmrwhat">${esc(t.task||'(no description)')}${t.client?' · '+esc(t.client):''}${t.proj?' · '+esc(t.proj):''}</span>`+
    `<button class="tmrbtn stop" id="tmr-stop">■ Stop &amp; log</button><button class="tmrbtn" id="tmr-discard">Discard</button></div>`;
  return `<div class="tmrbar"><input class="tmrtask" id="tmr-task" placeholder="What are you working on?">`+
    `<select class="tmrsel" id="tmr-client">${['(client)'].concat(CLIENTS.map(c=>c.name)).map(s=>opt(s,'(client)')).join('')}</select>`+
    `<select class="tmrsel" id="tmr-proj">${['(project)'].concat(PROJ_LIST.map(p=>p.name)).map(s=>opt(s,'(project)')).join('')}</select>`+
    `<button class="tmrbtn start" id="tmr-start">▶ Start</button></div>`;
}
function wireTimerBar(){
  if(getTimer()){
    const stop=document.getElementById('tmr-stop'); if(stop) stop.onclick=stopTimer;
    const dis=document.getElementById('tmr-discard'); if(dis) dis.onclick=discardTimer;
    tickTimer();
  } else { const st=document.getElementById('tmr-start'); if(st) st.onclick=startTimer; }
}
function startTimer(){
  const v=id=>{ const e=document.getElementById(id); return e?e.value:''; };
  const cl=v('tmr-client'), pr=v('tmr-proj');
  setTimer({startedAt:Date.now(), task:v('tmr-task').trim(), client:cl==='(client)'?'':cl, proj:pr==='(project)'?'':pr, billable:true});
  renderSection('timesheets');
}
function stopTimer(){
  const t=getTimer(); if(!t) return;
  const mins=Math.round((Date.now()-t.startedAt)/60000);
  if(mins<1 && !confirm('Less than a minute tracked — log it anyway?')){ discardTimer(); return; }
  const m=Math.max(1,mins);
  TIMESHEETS.push({date:dateVal(new Date()),client:t.client||'',proj:t.proj||'',task:t.task||'',minutes:m,billable:!!t.billable,notes:''});
  clearTimer(); saveTasks(); renderSection('timesheets'); toast('Logged '+fmtMins(m),{ms:2600});
}
function discardTimer(){ clearTimer(); renderSection('timesheets'); }
function startTimerForTask(t){
  if(getTimer() && !confirm('A timer is already running. Replace it with one for this task?')) return;
  setTimer({startedAt:Date.now(), task:t.label, client:t.project||'', proj:t.proj||'', billable:true});
  closeDetail(); switchView('timesheets');
}

function renderClientKey(){ const el=document.getElementById('clientkey'); if(!el) return; el.innerHTML='<span style="font-weight:600;color:var(--muted)">Client</span>'+CLIENTS.map(c=>`<span><i style="background:${c.color||NOCLIENT}"></i>${esc(c.name)}</span>`).join(''); }
function renderFilterClients(){ const el=document.getElementById('filterclient'); if(!el) return; const cur=filterClient; el.innerHTML='<option value="">All clients</option>'+CLIENTS.map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('')+'<option value="__none">No client</option>'; el.value=cur; }
document.querySelectorAll('.navitem').forEach(b=>b.onclick=()=>switchView(b.dataset.view));
document.getElementById('filterclient').onchange=function(){ filterClient=this.value; _lastEvents=null; };
document.getElementById('sortby').onchange=function(){ sortBy=this.value; _lastEvents=null; };

build();
renderClientKey();
renderFilterClients();
applySpeed(0);
render();
if(window.__loadError){
  const L=window.__loadError;
  setTimeout(()=>toast('⚠ Your saved data couldn’t be loaded — it has NOT been changed or overwritten. Reload to retry. If it keeps failing, download the raw data so it can be repaired.',{warn:true,sticky:true,actionLabel:'Download raw data',action:()=>{const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(L.raw);a.download='cyclical-raw-rescue.json';document.body.appendChild(a);a.click();a.remove();}}),700);
}
else setTimeout(checkBackupReminder,2500);
</script>
